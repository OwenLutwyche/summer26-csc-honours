name: Github CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Install Codon
        run: |
          mkdir -p ${HOME}/.codon
          curl -L https://github.com/exaloop/codon/releases/download/v0.19.3/codon-linux-x86_64.tar.gz | tar zxvf - --strip-components=1 -C ${HOME}/.codon
          curl -L https://github.com/exaloop/seq/releases/download/v0.11.5/seq-linux-x86_64.tar.gz | tar zxvf - -C ${HOME}/.codon/lib/codon/plugins
          export PATH=${PATH}:${HOME}/.codon/bin
      - name: Check out repository code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install Python dependencies
        run: |
          pip install find_libpython biopython biotite numpy pandas pysam jupyter nbconvert matplotlib
      - name: Install bioinformatics tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget bzip2 samtools bcftools libhts-dev libbz2-dev zlib1g-dev
          # Install minimap2
          wget https://github.com/lh3/minimap2/releases/download/v2.28/minimap2-2.28_x64-linux.tar.bz2
          tar -xjf minimap2-2.28_x64-linux.tar.bz2
          sudo cp minimap2-2.28_x64-linux/minimap2 /usr/local/bin/
          # Install HapCUT2
          git clone https://github.com/vibansal/HapCUT2.git
          cd HapCUT2
          make
          sudo cp build/extractHAIRS build/HAPCUT2 /usr/local/bin/
          cd ..
      - name: Set up Codon Python bridge
        run: |
          CODON_PYTHON=$(find_libpython)
          echo "CODON_PYTHON=${CODON_PYTHON}" >> $GITHUB_ENV
          echo "Found Python at: ${CODON_PYTHON}"
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: Week 1
        run: echo 'python3 week1/evaluate.py'
      - name: Week 2
        run: echo 'python3 week2/evaluate.py'
      - name: Week 3
        run: echo 'python3 week3/evaluate.py'
      - name: Week 4
        run: echo 'python3 week4/evaluate.py'
      - name: Week 5
        run: |
          cd week5
          echo 'jupyter execute week5.ipynb'
      - name: Week 6
        run: |
          cd week6
          jupyter execute week6.ipynb