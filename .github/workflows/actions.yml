name: Github CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Install Codon
        run: |
          mkdir -p ${HOME}/.codon
          curl -L https://github.com/exaloop/codon/releases/download/v0.19.3/codon-linux-x86_64.tar.gz | tar zxvf - --strip-components=1 -C ${HOME}/.codon
          curl -L https://github.com/exaloop/seq/releases/download/v0.11.5/seq-linux-x86_64.tar.gz | tar zxvf - -C ${HOME}/.codon/lib/codon/plugins
          export PATH=${PATH}:${HOME}/.codon/bin
      - name: Check out repository code
        uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install Python 3.12 for Week 6
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          # Python 3.13 dependencies for weeks 1-5
          python3.13 -m pip install find_libpython biopython biotite numpy pandas pysam jupyter nbconvert matplotlib scipy
          # Python 3.12 dependencies for week 6
          python3.12 -m pip install jupyter nbconvert 'anndata<0.11' scanpy leidenalg celltypist matplotlib pyroe numpy==1.26.4 pandas==2.2.2
      - name: Install bioinformatics tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget bzip2 samtools bcftools libhts-dev libbz2-dev zlib1g-dev cmake libtbb-dev curl build-essential pkg-config libssl-dev
          # Install minimap2
          wget https://github.com/lh3/minimap2/releases/download/v2.28/minimap2-2.28_x64-linux.tar.bz2
          tar -xjf minimap2-2.28_x64-linux.tar.bz2
          sudo cp minimap2-2.28_x64-linux/minimap2 /usr/local/bin/
          # Install HapCUT2
          git clone https://github.com/vibansal/HapCUT2.git
          cd HapCUT2
          make
          sudo cp build/extractHAIRS build/HAPCUT2 /usr/local/bin/
          cd ..
          # Install Rust/Cargo for Week 6
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          # Install salmon
          wget https://github.com/COMBINE-lab/salmon/releases/download/v1.10.0/salmon-1.10.0_linux_x86_64.tar.gz
          tar -xzf salmon-1.10.0_linux_x86_64.tar.gz
          sudo cp salmon-latest_linux_x86_64/bin/salmon /usr/local/bin/
          # Install alevin-fry and simpleaf
          cargo install --locked alevin-fry
          cargo install --locked simpleaf --version 0.18.3 || cargo install --locked simpleaf
          # Set up alevin-fry environment
          export ALEVIN_FRY_HOME="$HOME/.alevin_fry"
          mkdir -p "$HOME/.alevin_fry"
          echo "ALEVIN_FRY_HOME=$HOME/.alevin_fry" >> $GITHUB_ENV
      - name: Set up Codon Python bridge
        run: |
          CODON_PYTHON=$(find_libpython)
          echo "CODON_PYTHON=${CODON_PYTHON}" >> $GITHUB_ENV
          echo "Found Python at: ${CODON_PYTHON}"
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: Week 1
        run: echo 'python3 week1/evaluate.py'
      - name: Week 2
        run: echo 'python3 week2/evaluate.py'
      - name: Week 3
        run: echo 'python3 week3/evaluate.py'
      - name: Week 4
        run: echo 'python3 week4/evaluate.py'
      - name: Week 5
        run: |
          cd week5
          echo 'jupyter execute week5.ipynb'
      - name: Week 6
        run: |
          cd week6
          python3.12 -m jupyter execute week6.ipynb